# Nginx 配置模板 — 保存为 /etc/nginx/conf.d/apple-blog.conf
# 将 your-domain.com 替换为你的域名或服务器 IP

server {
    listen 80;
    server_name 161.118.242.212;

    # 日志
    access_log /var/log/nginx/apple-blog-access.log;
    error_log  /var/log/nginx/apple-blog-error.log;

    # 上传文件大小限制（图片上传）
    client_max_body_size 20M;

    # 静态资源 — Next.js 构建产物
    location /_next/static {
        alias /var/www/apple-blog/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # 上传的图片
    location /uploads/ {
        alias /var/www/apple-blog/public/uploads/;
    }

    # 所有其他请求代理到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

